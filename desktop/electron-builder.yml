appId: com.southwestrebooker.app
productName: Southwest Rebooker
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/node_modules/sql.js/dist/*.wasm"
win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
